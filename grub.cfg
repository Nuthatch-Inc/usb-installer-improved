# GRUB2 configuration for multi-boot USB (Option C: Hybrid)
#
# Linux distros are booted via loopback from ISOs on the LINUXISOS partition.
# Windows 11 is chainloaded from a dedicated NTFS partition.
#
# To add a new Linux distro:
#   1. Copy the ISO to the isos/ directory on LINUXISOS
#   2. Add a menuentry below with the correct kernel params for that distro
#   3. Reboot — done

set timeout=30
set default=0
set gfxmode=auto

# ── Modules ──────────────────────────────────────────────────────
insmod part_gpt
insmod fat
insmod exfat
insmod ntfs
insmod loopback
insmod iso9660
insmod linux
insmod chain
insmod search
insmod gfxterm
insmod png

# ── Locate partitions by label ───────────────────────────────────
search --no-floppy --label --set=isopart "LINUXISOS"
search --no-floppy --label --set=winpart "WIN11"

# ── Theme / appearance ───────────────────────────────────────────
if loadfont /boot/grub/fonts/unicode.pf2; then
    terminal_output gfxterm
fi

set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

# ══════════════════════════════════════════════════════════════════
#  Ubuntu
# ══════════════════════════════════════════════════════════════════

menuentry "Ubuntu 24.04.2 LTS Desktop" {
    set isofile="/isos/ubuntu-24.04.2-desktop-amd64.iso"
    loopback loop ($isopart)$isofile
    linux (loop)/casper/vmlinuz boot=casper iso-scan/filename=$isofile quiet splash ---
    initrd (loop)/casper/initrd
}

menuentry "Ubuntu 24.04.2 LTS Desktop (Safe Graphics)" {
    set isofile="/isos/ubuntu-24.04.2-desktop-amd64.iso"
    loopback loop ($isopart)$isofile
    linux (loop)/casper/vmlinuz boot=casper iso-scan/filename=$isofile quiet splash nomodeset ---
    initrd (loop)/casper/initrd
}

menuentry "Ubuntu 24.04 Server" {
    set isofile="/isos/ubuntu-24.04-live-server-amd64.iso"
    loopback loop ($isopart)$isofile
    linux (loop)/casper/vmlinuz boot=casper iso-scan/filename=$isofile quiet ---
    initrd (loop)/casper/initrd
}

# ══════════════════════════════════════════════════════════════════
#  Fedora
# ══════════════════════════════════════════════════════════════════

menuentry "Fedora 41 Workstation Live" {
    set isofile="/isos/Fedora-Workstation-Live-x86_64-41.iso"
    loopback loop ($isopart)$isofile
    linux (loop)/images/pxeboot/vmlinuz iso-scan/filename=$isofile rd.live.image quiet
    initrd (loop)/images/pxeboot/initrd.img
}

menuentry "Fedora 41 Workstation Live (Basic Graphics)" {
    set isofile="/isos/Fedora-Workstation-Live-x86_64-41.iso"
    loopback loop ($isopart)$isofile
    linux (loop)/images/pxeboot/vmlinuz iso-scan/filename=$isofile rd.live.image nomodeset quiet
    initrd (loop)/images/pxeboot/initrd.img
}

# ══════════════════════════════════════════════════════════════════
#  Windows 11
# ══════════════════════════════════════════════════════════════════

menuentry "Windows 11 Installer" {
    if [ -n "$winpart" ]; then
        chainloader ($winpart)/efi/boot/bootx64.efi
    else
        echo "Windows 11 partition (WIN11) not found."
        echo "Run setup.sh with --win-iso to create it."
        sleep 5
    fi
}

# ══════════════════════════════════════════════════════════════════
#  Utilities
# ══════════════════════════════════════════════════════════════════

menuentry "UEFI Firmware Settings" {
    fwsetup
}

menuentry "Reboot" {
    reboot
}

menuentry "Power Off" {
    halt
}
