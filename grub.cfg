# GRUB2 configuration for multi-boot USB (partition-per-ISO)
#
# This placeholder is installed by setup.sh and overwritten with
# real entries during setup or by update-grub.sh.
#
# To update: sudo ./update-grub.sh /dev/sdX
#
# No insmod lines — all required modules are built into the signed
# grubx64.efi binary. Fully Secure Boot compatible.

set timeout=30
set default=0

menuentry ">>> Run setup.sh or update-grub.sh to populate this menu <<<" {
    echo "No ISOs have been installed yet."
    echo ""
    echo "To set up the drive:"
    echo "  sudo ./setup.sh /dev/sdX --iso path/to/linux.iso"
    echo ""
    echo "To add an ISO to an existing drive:"
    echo "  sudo ./add-iso.sh /dev/sdX path/to/linux.iso"
    echo ""
    echo "To rebuild the menu after changes:"
    echo "  sudo ./update-grub.sh /dev/sdX"
    sleep 15
}

# ══════════════════════════════════════════════════════════════════
#  Utilities
# ══════════════════════════════════════════════════════════════════

menuentry "UEFI Firmware Settings" {
    fwsetup
}

menuentry "Reboot" {
    reboot
}

menuentry "Power Off" {
    halt
}
