# GRUB2 configuration for multi-boot USB
#
# This config DYNAMICALLY scans for ISO files at boot time.
# Just drop an ISO into  isos/  on the LINUXISOS partition and reboot.
#
# Supported distro families (auto-detected by probing inside each ISO):
#   - Ubuntu / Linux Mint / Pop!_OS / elementary  (casper-based)
#   - Fedora / RHEL / CentOS / Rocky / Alma       (Anaconda / pxeboot)
#   - Debian / Kali / Tails                        (debian-live)
#   - Arch Linux / EndeavourOS                     (archiso)
#   - openSUSE / SLES                              (SUSE loader)
#
# Windows 11 is chainloaded from a dedicated NTFS partition (if present).
#
# NOTE: setup.sh replaces the label-based "search" lines below with
#       UUID-based searches so the USB never confuses its own partitions
#       with similarly-named partitions on the host machine.

set timeout=30
set default=0
set gfxmode=auto

# ── Modules ──────────────────────────────────────────────────────
insmod part_gpt
insmod fat
insmod exfat
insmod ntfs
insmod loopback
insmod iso9660
insmod linux
insmod chain
insmod search
insmod gfxterm
insmod png
insmod regexp

# ── Locate partitions by label ───────────────────────────────────
# (setup.sh rewrites these to fs-uuid at install time)
search --no-floppy --label --set=isopart "LINUXISOS"
search --no-floppy --label --set=winpart "WIN11"

# ── Theme / appearance ───────────────────────────────────────────
if loadfont /boot/grub/fonts/unicode.pf2; then
    terminal_output gfxterm
fi

set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

# ══════════════════════════════════════════════════════════════════
#  Auto-detected Linux ISOs
# ══════════════════════════════════════════════════════════════════

set found_iso="0"

for file in ($isopart)/isos/*.iso; do

    # If the glob matched nothing, $file is the literal pattern
    if [ ! -e "$file" ]; then
        break
    fi

    set found_iso="1"

    # Extract path relative to partition  (e.g. /isos/ubuntu.iso)
    regexp --set=1:isopath '(\/.*)$' "$file"
    # Extract bare filename for the menu label
    regexp --set=1:isoname '\/isos\/(.+)$' "$file"

    if [ -z "$isopath" ]; then set isopath="$file"; fi
    if [ -z "$isoname" ]; then set isoname="$file"; fi

    # ── Probe the ISO to detect distro family ────────────────────
    loopback loopprobe "$file"
    set dtype="unknown"

    if [ -f (loopprobe)/casper/vmlinuz ]; then
        set dtype="casper"
    elif [ -f (loopprobe)/images/pxeboot/vmlinuz ]; then
        set dtype="fedora"
    elif [ -f (loopprobe)/live/vmlinuz ]; then
        set dtype="debian-live"
    elif [ -f (loopprobe)/arch/boot/x86_64/vmlinuz-linux ]; then
        set dtype="arch"
    elif [ -f (loopprobe)/boot/x86_64/loader/linux ]; then
        set dtype="opensuse"
    fi

    loopback -d loopprobe

    # ── Generate menu entries ────────────────────────────────────
    # $isopath is loop-variable → passed as a positional arg so
    # each menuentry captures its own value.  Inside the block
    # $1 = first extra arg (the iso path).

    if [ "$dtype" = "casper" ]; then
        menuentry "Boot ${isoname}" "$isopath" {
            loopback loop ($isopart)$1
            linux (loop)/casper/vmlinuz boot=casper iso-scan/filename=$1 quiet splash ---
            initrd (loop)/casper/initrd
        }
        menuentry "Boot ${isoname}  (safe graphics)" "$isopath" {
            loopback loop ($isopart)$1
            linux (loop)/casper/vmlinuz boot=casper iso-scan/filename=$1 quiet splash nomodeset ---
            initrd (loop)/casper/initrd
        }

    elif [ "$dtype" = "fedora" ]; then
        menuentry "Boot ${isoname}" "$isopath" {
            loopback loop ($isopart)$1
            linux (loop)/images/pxeboot/vmlinuz iso-scan/filename=$1 rd.live.image quiet
            initrd (loop)/images/pxeboot/initrd.img
        }
        menuentry "Boot ${isoname}  (basic graphics)" "$isopath" {
            loopback loop ($isopart)$1
            linux (loop)/images/pxeboot/vmlinuz iso-scan/filename=$1 rd.live.image nomodeset quiet
            initrd (loop)/images/pxeboot/initrd.img
        }

    elif [ "$dtype" = "debian-live" ]; then
        menuentry "Boot ${isoname}" "$isopath" {
            loopback loop ($isopart)$1
            linux (loop)/live/vmlinuz boot=live findiso=$1 quiet splash ---
            initrd (loop)/live/initrd.img
        }
        menuentry "Boot ${isoname}  (safe graphics)" "$isopath" {
            loopback loop ($isopart)$1
            linux (loop)/live/vmlinuz boot=live findiso=$1 quiet splash nomodeset ---
            initrd (loop)/live/initrd.img
        }

    elif [ "$dtype" = "arch" ]; then
        menuentry "Boot ${isoname}" "$isopath" {
            loopback loop ($isopart)$1
            linux (loop)/arch/boot/x86_64/vmlinuz-linux img_dev=/dev/disk/by-label/LINUXISOS img_loop=$1 earlymodules=loop
            initrd (loop)/arch/boot/x86_64/initramfs-linux.img
        }
        menuentry "Boot ${isoname}  (safe graphics)" "$isopath" {
            loopback loop ($isopart)$1
            linux (loop)/arch/boot/x86_64/vmlinuz-linux img_dev=/dev/disk/by-label/LINUXISOS img_loop=$1 earlymodules=loop nomodeset
            initrd (loop)/arch/boot/x86_64/initramfs-linux.img
        }

    elif [ "$dtype" = "opensuse" ]; then
        menuentry "Boot ${isoname}" "$isopath" {
            loopback loop ($isopart)$1
            linux (loop)/boot/x86_64/loader/linux iso-scan/filename=$1 splash=silent quiet
            initrd (loop)/boot/x86_64/loader/initrd
        }
        menuentry "Boot ${isoname}  (safe graphics)" "$isopath" {
            loopback loop ($isopart)$1
            linux (loop)/boot/x86_64/loader/linux iso-scan/filename=$1 splash=silent quiet nomodeset
            initrd (loop)/boot/x86_64/loader/initrd
        }

    else
        menuentry "Boot ${isoname}  (unrecognised layout)" "$isopath" {
            echo "Could not auto-detect the distro type for this ISO."
            echo "Attempting a casper-style boot as a fallback..."
            sleep 3
            loopback loop ($isopart)$1
            linux (loop)/casper/vmlinuz boot=casper iso-scan/filename=$1 quiet splash ---
            initrd (loop)/casper/initrd
        }
    fi
done

if [ "$found_iso" = "0" ]; then
    menuentry "── No ISOs found ──  copy .iso files to isos/ on LINUXISOS" {
        echo "Place .iso files in the isos/ directory on the LINUXISOS partition."
        echo "Reboot to see them listed here automatically."
        sleep 10
    }
fi

# ══════════════════════════════════════════════════════════════════
#  Windows 11
# ══════════════════════════════════════════════════════════════════

menuentry "Windows 11 Installer" {
    if [ -n "$winpart" ]; then
        chainloader ($winpart)/efi/boot/bootx64.efi
    else
        echo "Windows 11 partition (WIN11) not found."
        echo "Run setup.sh with --win-iso to create it."
        sleep 5
    fi
}

# ══════════════════════════════════════════════════════════════════
#  Utilities
# ══════════════════════════════════════════════════════════════════

menuentry "UEFI Firmware Settings" {
    fwsetup
}

menuentry "Reboot" {
    reboot
}

menuentry "Power Off" {
    halt
}
