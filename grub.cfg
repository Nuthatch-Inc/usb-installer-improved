# GRUB2 configuration for multi-boot USB
#
# This file is auto-generated by update-grub.sh.
# Do not edit manually — your changes will be overwritten.
#
# To update: copy/remove ISOs in isos/ on LINUXISOS, then run:
#   sudo ./update-grub.sh /dev/sdX
#
# No insmod lines are needed — Ubuntu's signed grubx64.efi has all
# required modules (loopback, iso9660, linux, chain, search, etc.)
# built in, so this config is fully Secure Boot compatible.

set timeout=30
set default=0

# ── Locate partitions by UUID ────────────────────────────────────
# (update-grub.sh writes the real UUIDs here)
search --no-floppy --label --set=isopart "LINUXISOS"
search --no-floppy --label --set=winpart "WIN11"

# ══════════════════════════════════════════════════════════════════
#  Placeholder — run update-grub.sh to populate
# ══════════════════════════════════════════════════════════════════

menuentry ">>> Run update-grub.sh to detect ISOs <<<" {
    echo "No ISOs have been registered yet."
    echo ""
    echo "Copy .iso files to isos/ on the LINUXISOS partition, then run:"
    echo "  sudo ./update-grub.sh /dev/sdX"
    echo ""
    echo "The menu will be rebuilt with entries for each ISO."
    sleep 15
}

# ══════════════════════════════════════════════════════════════════
#  Windows 11
# ══════════════════════════════════════════════════════════════════

menuentry "Windows 11 Installer" {
    if [ -n "$winpart" ]; then
        chainloader ($winpart)/efi/boot/bootx64.efi
    else
        echo "Windows 11 partition (WIN11) not found."
        echo "Run setup.sh with --win-iso to create it."
        sleep 5
    fi
}

# ══════════════════════════════════════════════════════════════════
#  Utilities
# ══════════════════════════════════════════════════════════════════

menuentry "UEFI Firmware Settings" {
    fwsetup
}

menuentry "Reboot" {
    reboot
}

menuentry "Power Off" {
    halt
}
